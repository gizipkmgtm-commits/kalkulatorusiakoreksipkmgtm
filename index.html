<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Usia Koreksi</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #f4f6f9;
}

/* CONTAINER */
.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}

/* CARD */
.card {
  background: #fff;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 15px;
}

.header img {
  width: 70px;
}

.header h2 {
  margin: 8px 0 0;
  font-size: 20px;
}

/* INPUT */
label {
  font-size: 14px;
  margin-top: 10px;
  display: block;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 16px;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 15px;
  padding: 14px;
  border: none;
  border-radius: 15px;
  background: #2193b0;
  color: white;
  font-size: 16px;
  font-weight: bold;
}

/* RESULT */
.result {
  margin-top: 15px;
  padding: 15px;
  background: #eef7fb;
  border-radius: 15px;
  font-size: 14px;
}

/* FOOTER */
.footer {
  text-align: center;
  font-size: 12px;
  color: #888;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <!-- HEADER -->
    <div class="header">
      <img src="logo.png">
      <h2>Usia Koreksi Bayi</h2>
    </div>

    <!-- INPUT -->
    <label>Tanggal Lahir Bayi</label>
    <input type="date" id="tglLahir">

    <label>Usia Kehamilan Saat Lahir (minggu)</label>
    <input type="number" id="usiaKehamilan" placeholder="Contoh: 32">

    <button onclick="hitung()">Hitung Usia</button>

    <!-- HASIL -->
    <div class="result" id="hasil"></div>

    <!-- FOOTER -->
    <div class="footer">
      © 2026<br>
      Dibuat oleh <b>M Ariffullah, A.Md.Gz</b><br>
      BaPau GinBal (Barcode Pemantauan Gizi Anak Balita)
    </div>

  </div>
</div>

<script>
function konversiHari(hari) {
  let bulan = Math.floor(hari / 30);
  let sisaHari = hari % 30;

  let minggu = Math.floor(sisaHari / 7);
  let hariSisa = sisaHari % 7;

  return bulan + " bulan " + minggu + " minggu " + hariSisa + " hari";
}

function hitung() {
  const tglInput = document.getElementById("tglLahir").value;
  const usiaKehamilan = parseInt(document.getElementById("usiaKehamilan").value);

  if (!tglInput || !usiaKehamilan) {
    alert("Lengkapi semua data!");
    return;
  }

  const tglLahir = new Date(tglInput);
  const hariIni = new Date();

  const selisihHari = Math.floor((hariIni - tglLahir) / (1000 * 60 * 60 * 24));

  const prematurMinggu = 40 - usiaKehamilan;
  const koreksiHari = prematurMinggu * 7;

  const usiaKoreksiHari = selisihHari - koreksiHari;

  document.getElementById("hasil").innerHTML = `
    <b>Usia Kronologis:</b><br>
    ${konversiHari(selisihHari)}<br><br>

    <b>Usia Koreksi:</b><br>
    ${usiaKoreksiHari > 0 ? konversiHari(usiaKoreksiHari) : "0 bulan 0 minggu 0 hari"}<br><br>

    <b>Prematur:</b> ${prematurMinggu} minggu
  `;
}
</script>

</body>
</html>
